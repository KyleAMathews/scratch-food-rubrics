<script>
'use strict';
const DATA=JSON.parse(document.getElementById('interactive-data').textContent);
const $=id=>document.getElementById(id);
const defaultRatingFloor=Number(DATA.theme.rating_floor);
const state={mode:'practical',query:'',sort:DATA.theme.default_sort||'combined',rating:defaultRatingFloor,selectedFacets:{},selectedId:null,savedOnly:false};
const byId=new Map([...DATA.practical,...DATA.audit].map(r=>[r.id,r]));
const storageKey=`scratch-food-interactive-shortlist:v1:${DATA.meta.run_id}`;
let saved=new Set();try{saved=new Set(JSON.parse(localStorage.getItem(storageKey)||'[]').filter(id=>byId.has(id)))}catch{};
let map=null,markerLayer=null,markers=new Map(),lastFocus=null;
document.documentElement.dataset.category=DATA.meta.category;
$('site-title').textContent=DATA.meta.title;
$('site-scope').textContent=`${DATA.meta.scope} · snapshot ${DATA.meta.snapshots.run_date}`;
document.title=DATA.meta.title;
if(!DATA.practical.some(r=>r.coordinates)){document.body.classList.add('list-only')}
DATA.facets.forEach(f=>state.selectedFacets[f.key]=new Set());

function currentRows(){return state.mode==='practical'?DATA.practical:DATA.audit}
function textMatch(r){const hay=[r.name,r.address,r.location_label,r.summary,...Object.values(r.facet_values).flat()].filter(Boolean).join(' ').toLowerCase();return hay.includes(state.query.toLowerCase())}
function ratingValue(r){return r.rating&&typeof r.rating.value==='number'?r.rating.value:null}
function matches(r,skipFacet=null){if(!textMatch(r))return false;if(state.savedOnly&&!saved.has(r.id))return false;if(state.rating>defaultRatingFloor&&(ratingValue(r)===null||ratingValue(r)<state.rating))return false;for(const [key,chosen] of Object.entries(state.selectedFacets)){if(key===skipFacet||!chosen.size)continue;const vals=new Set(r.facet_values[key]||[]);if(![...chosen].some(v=>vals.has(v)))return false}return true}
function sortRows(rows){return rows.sort((a,b)=>{if(state.sort==='alpha')return a.name.localeCompare(b.name);if(state.sort==='rating')return (ratingValue(b)??-1)-(ratingValue(a)??-1)||((b.score&&b.score.g)||-1)-((a.score&&a.score.g)||-1);return ((b.score&&b.score.g)||-1)-((a.score&&a.score.g)||-1)||a.name.localeCompare(b.name)})}
function alternateFacetCounts(key){const counts={};for(const r of currentRows().filter(row=>matches(row,key)))for(const value of r.facet_values[key]||[])counts[value]=(counts[value]||0)+1;return counts}
function el(tag,className,text){const node=document.createElement(tag);if(className)node.className=className;if(text!==undefined)node.textContent=text;return node}
function badge(text){return el('span','badge',text)}
function metric(label,value){const n=el('span');n.append(el('strong','',`${label}: `),document.createTextNode(value));return n}
function scoreMetrics(r){const out=[];if(!r.score)return out;if(r.score.state==='partial'){out.push(metric('Scratch evidence',`${r.score.s_earned}/${r.score.s_observed_possible}`),metric('Coverage',`${Math.round(r.score.s_coverage*100)}% · ${r.score.confidence}`));return out}if(typeof r.score.s==='number')out.push(metric('Scratch',Math.round(r.score.s)));if(typeof r.score.g==='number')out.push(metric('Combined',r.score.g.toFixed(1)));return out}
function saveButton(r){const b=el('button','save',saved.has(r.id)?'Saved':'Save');b.type='button';b.setAttribute('aria-pressed',String(saved.has(r.id)));b.addEventListener('click',e=>{e.stopPropagation();saved.has(r.id)?saved.delete(r.id):saved.add(r.id);localStorage.setItem(storageKey,JSON.stringify([...saved]));render()});return b}
function mapLink(r){if(!r.map_url)return el('span','location','No accepted map location');const a=el('a','',r.map_action);a.href=r.map_url;a.target='_blank';a.rel='noopener noreferrer';a.addEventListener('click',e=>e.stopPropagation());return a}
function card(r){const c=el('article','card');c.dataset.recordId=r.id;c.dataset.selected=String(state.selectedId===r.id);c.tabIndex=-1;const top=el('div','card-top');const title=el('div');title.append(el('h3','',r.name),el('div','location',r.location_label||r.address||'Location unavailable'));top.append(title,saveButton(r));c.append(top);const badges=el('div','badges');for(const key of Object.keys(r.facet_values))for(const v of r.facet_values[key]){const f=DATA.facets.find(x=>x.key===key),opt=f&&f.values.find(x=>x.value===v);if(opt)badges.append(badge(opt.label))}c.append(badges);if(r.summary)c.append(el('p','summary',r.summary));const metrics=el('div','metrics');metrics.append(...scoreMetrics(r));if(r.rating&&r.rating.value!==null)metrics.append(metric('Rating',`${r.rating.value.toFixed(1)} · ${r.rating.provenance}`));if(r.access)metrics.append(metric('Access',r.access.state));c.append(metrics);const actions=el('div','actions');actions.append(mapLink(r));c.append(actions);if(r.coordinates)c.addEventListener('click',()=>selectRecord(r.id,true));return c}
function auditRow(r){const c=el('article','audit-row');c.dataset.recordId=r.id;c.tabIndex=-1;c.append(el('h3','',r.name),el('div','location',r.location_label||r.address||'Location unavailable'),el('p','reason',r.reason||r.disposition));const metrics=el('div','metrics');metrics.append(...scoreMetrics(r));if(r.access)metrics.append(metric('Last access',`${r.access.state}${r.access.evidence_date?' · '+r.access.evidence_date:''}`));c.append(metrics,el('div','actions'));c.lastChild.append(mapLink(r));return c}
function renderFacets(){const host=$('facet-groups');host.replaceChildren();for(const f of DATA.facets){const field=el('fieldset','facet-group');field.append(el('legend','',f.label));const counts=alternateFacetCounts(f.key);for(const opt of f.values){const label=el('label','facet-option');const input=document.createElement('input');input.type='checkbox';input.checked=state.selectedFacets[f.key].has(opt.value);input.addEventListener('change',()=>{input.checked?state.selectedFacets[f.key].add(opt.value):state.selectedFacets[f.key].delete(opt.value);render()});label.append(input,document.createTextNode(opt.label),el('span','',String(counts[opt.value]||0)));field.append(label)}host.append(field)}}
function render(){renderFacets();$('saved-count').textContent=String(saved.size);$('rating-value').textContent=state.rating.toFixed(1)+'+';$('mode-heading').textContent=state.mode==='practical'?'Places to try':'Audit records';const rows=sortRows(currentRows().filter(r=>matches(r)));$('result-count').textContent=`${rows.length} result${rows.length===1?'':'s'}`;const host=$('cards');host.replaceChildren();if(!rows.length){const empty=el('div','empty');empty.append(el('p','', 'No places match these filters.'),resetButton());host.append(empty)}else for(const r of rows)host.append(state.mode==='practical'?card(r):auditRow(r));renderMap(rows)}
function resetButton(){const b=el('button','', 'Reset filters');b.type='button';b.addEventListener('click',reset);return b}
function reset(){state.query='';$('search').value='';state.rating=defaultRatingFloor;$('rating-floor').value=String(defaultRatingFloor);state.savedOnly=false;$('saved-only').checked=false;for(const set of Object.values(state.selectedFacets))set.clear();render()}
function initMap(){if(map||document.body.classList.contains('list-only')||typeof L==='undefined')return;map=L.map('map',{zoomControl:true});L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'&copy; OpenStreetMap contributors'}).addTo(map);markerLayer=L.layerGroup().addTo(map)}
function renderMap(rows){if(state.mode!=='practical'){if(markerLayer)markerLayer.clearLayers();$('mapped-count').textContent='Audit mode';return}initMap();if(!map)return;markerLayer.clearLayers();markers.clear();const bounds=[];for(const r of rows.filter(x=>x.coordinates)){const marker=L.circleMarker([r.coordinates.lat,r.coordinates.lng],{radius:state.selectedId===r.id?10:7,color:state.selectedId===r.id?'#202921':'#a44c2f',fillOpacity:.85});const popup=el('div');popup.append(el('strong','',r.name),el('div','location',r.location_label));const show=el('button','', 'Show card');show.type='button';show.addEventListener('click',()=>showCard(r.id));popup.append(show);marker.bindPopup(popup);marker.on('click',()=>{state.selectedId=r.id;render()});marker.addTo(markerLayer);markers.set(r.id,marker);bounds.push([r.coordinates.lat,r.coordinates.lng])}$('mapped-count').textContent=`${bounds.length} mapped`;if(state.selectedId&&markers.has(state.selectedId)){const marker=markers.get(state.selectedId);map.panTo(marker.getLatLng());marker.openPopup()}else if(bounds.length)map.fitBounds(bounds,{padding:[30,30],maxZoom:14});setTimeout(()=>map.invalidateSize(),0)}
function selectRecord(id,openMap){state.selectedId=id;render();if(openMap&&window.innerWidth<=1050)openOverlay('map');if(markers.has(id))markers.get(id).openPopup()}
function showCard(id){state.mode='practical';setMode('practical');state.selectedId=id;closeOverlays();render();requestAnimationFrame(()=>{const c=document.querySelector(`[data-record-id="${CSS.escape(id)}"]`);if(c){c.scrollIntoView({block:'center',behavior:'smooth'});c.focus()}})}
function setMode(mode){state.mode=mode;$('mode-practical').classList.toggle('active',mode==='practical');$('mode-audit').classList.toggle('active',mode==='audit');$('mode-practical').setAttribute('aria-pressed',String(mode==='practical'));$('mode-audit').setAttribute('aria-pressed',String(mode==='audit'));render()}
function openOverlay(which){lastFocus=document.activeElement;if(which==='facets'){$('facet-panel').classList.add('open');$('filters-toggle').setAttribute('aria-expanded','true')}else{$('map-panel').classList.add('open');$('map-toggle').setAttribute('aria-expanded','true');setTimeout(()=>map&&map.invalidateSize(),0)}$('backdrop').classList.add('open')}
function closeOverlays(){$('facet-panel').classList.remove('open');$('map-panel').classList.remove('open');$('backdrop').classList.remove('open');$('filters-toggle').setAttribute('aria-expanded','false');$('map-toggle').setAttribute('aria-expanded','false');if(lastFocus&&document.contains(lastFocus))lastFocus.focus();lastFocus=null}
$('search').addEventListener('input',e=>{state.query=e.target.value;render()});$('sort').value=state.sort;$('sort').addEventListener('change',e=>{state.sort=e.target.value;render()});$('rating-floor').min=String(defaultRatingFloor);$('rating-floor').value=String(defaultRatingFloor);$('rating-floor').addEventListener('input',e=>{state.rating=Number(e.target.value);render()});$('saved-only').addEventListener('change',e=>{state.savedOnly=e.target.checked;render()});$('reset').addEventListener('click',reset);$('mode-practical').addEventListener('click',()=>setMode('practical'));$('mode-audit').addEventListener('click',()=>setMode('audit'));$('filters-toggle').addEventListener('click',()=>openOverlay('facets'));$('map-toggle').addEventListener('click',()=>openOverlay('map'));$('backdrop').addEventListener('click',closeOverlays);document.querySelectorAll('[data-close]').forEach(b=>b.addEventListener('click',closeOverlays));document.addEventListener('keydown',e=>{if(e.key==='Escape')closeOverlays()});
render();
</script>
</body>
</html>
